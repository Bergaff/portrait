<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atlas — Портрет квартала</title>
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <link rel="shortcut icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
<div id="app">
    <!-- Левая навигация -->
    <nav id="rail">
        <div class="rail-logo">A</div>
        <div class="rail-nav">
            <button class="rail-btn active" title="Обзор" data-icon="compass"></button>
            <button class="rail-btn" title="Карта" data-icon="map"></button>
            <button class="rail-btn" title="Тренды" data-icon="trending-up"></button>
            <button class="rail-btn" title="Районы" data-icon="layers"></button>
            <button class="rail-btn" title="События" data-icon="activity"></button>

    <!-- Mobile drag handle -->
    <div id="mobile-handle">
        <i data-lucide="message-circle"></i>
    </div>

    <!-- Mobile Overlay -->
    <div id="mobile-overlay">
        <div id="mobile-content">
            <div id="mobile-header">
                <button id="mobile-back-btn" class="btn-outline" style="padding:6px 12px;font-size:12px">
                    <i data-lucide="arrow-left"></i> К карте
                </button>
                <span>Инструменты</span>
                <div id="mobile-close">×</div>
            </div>
              <div id="mobile-body">
                  <!-- Содержимое будет перенесено сюда через JS -->
              </div>
          </div>
      </div>

        </div>
        <div class="rail-bottom">
            <button class="rail-btn" title="Настройки" data-icon="settings"></button>
        </div>
    </nav>

    <!-- Основная область -->
    <div id="main">
        <!-- Верхняя панель -->
        <header id="header">
            <div class="header-left">
                <h1 class="header-title">Atlas Urban Analytics</h1>
                <span class="header-badge">v1.84</span>
            </div>
    <div class="header-right">
        <div class="search-box">
            <i data-lucide="search" class="search-icon"></i>
            <input type="text" id="search-input" placeholder="Поиск места..." class="search-input" autocomplete="new-password" name="unique_search_id_8829">
            <div id="search-results"></div>
        </div>
        <button id="theme-toggle" onclick="toggleTheme()" title="Тема">
            <i data-lucide="moon" class="icon-dark"></i>
            <i data-lucide="sun" class="icon-light"></i>
        </button>
        <div id="user-info" style="display:none;">
                    <div id="profile-trigger" onclick="openProfile()" title="Профиль">
                        <i data-lucide="user"></i>
                    </div>
                    <button class="btn-ghost" onclick="confirmSignOut()">Выйти</button>
                </div>
                <button id="auth-btn" class="btn-primary-sm" onclick="toggleAuth()">Войти</button>
            </div>
        </header>

        <!-- Контент: карта + сайдбар -->
        <div id="workspace">
            <!-- Карта -->
            <section id="map-section">
                <div id="map"></div>
                <div id="map-legend">
                    <p class="legend-title">Плотность POI</p>
                    <div class="legend-items">
                        <span><span class="legend-dot high"></span>Высокая</span>
                        <span><span class="legend-dot mid"></span>Средняя</span>
                        <span><span class="legend-dot low"></span>Низкая</span>
                    </div>
                </div>
            </section>

            <!-- Resizer -->
            <div id="resizer"><div class="resizer-handle"></div></div>

            <!-- Правая панель -->
            <aside id="sidebar">
                <!-- Метрики -->
                <div id="scores-panel" style="display:none;"></div>

                <!-- Действия -->
                <div id="actions-panel" style="display:none;">
                    <div class="btn-with-info">
                        <button id="analyze-btn" class="btn-primary" onclick="openAnalyzeModal('free')">
                            <i data-lucide="activity"></i> Анализ
                            <span class="btn-tag tag-free">FREE</span>
                        </button>
                        <div class="info-tooltip-trigger" data-tooltip="Базовый экспресс-анализ на базе OpenStreetMap. Показывает инфраструктуру, метрики и расчёт индекса квартала. Бесплатно и быстро.">
                            <i data-lucide="help-circle"></i>
                        </div>
                    </div>

                    <div class="btn-with-info">
                        <button id="analyze-pro-btn" class="btn-outline" onclick="openAnalyzeModal('pro')">
                            <i data-lucide="sparkles"></i> Премиум-анализ
                            <span class="btn-tag tag-pro">PRO</span>
                        </button>
                        <div class="info-tooltip-trigger" data-tooltip="Глубокий анализ реальных данных с Яндекс.Карт: рейтинги, отзывы жителей, выявление проблемных мест и ИИ-анализ комментариев.">
                            <i data-lucide="help-circle"></i>
                        </div>
                    </div>

                    <button id="report-btn" class="btn-outline" style="display:none;" onclick="generateReport()">
                        <i data-lucide="file-text" id="report-icon"></i> Полный отчёт
                    </button>
                </div>

                <!-- Быстрые вопросы -->
                <div id="quick-questions" style="display:none;">
                    <button class="btn-chip" onclick="askQuick('Какой бизнес открыть?')">Бизнес?</button>
                    <button class="btn-chip" onclick="askQuick('Безопасно ли тут?')">Безопасно?</button>
                    <button class="btn-chip" onclick="askQuick('Подходит для семьи?')">Для семьи?</button>
                    <button class="btn-chip" onclick="askQuick('Чего не хватает?')">Чего нет?</button>
                </div>

                <!-- AI Чат -->
                <div id="chat-section">
                    <div class="chat-section-header">
                        <i data-lucide="sparkles" class="spark-icon"></i>
                        <span>AI-урбанист</span>
                        <span class="version-badge">v1.84</span>
                    </div>
                    <div id="chat-messages"></div>
                    <div class="chat-input-box">
                        <input type="text" id="chat-input" placeholder="Спросите про район..." class="chat-input" autocomplete="new-password" name="unique_chat_id_9921">
                        <button id="send-btn" onclick="sendMessage()" title="Отправить">
                            <i data-lucide="send"></i>
                        </button>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <!-- City Modal -->
    <div id="city-modal">
        <div class="modal-bg"></div>
        <div class="modal-box">
            <div class="modal-icon">🏘️</div>
            <h2>Atlas Urban Analytics</h2>
            <p class="modal-sub">AI-анализ городской инфраструктуры</p>
            <div id="city-detecting">Определяем ваш город...</div>
            <div id="city-confirm" style="display:none;">
                <p>Ваш город: <b id="city-name-show"></b>?</p>
                <div class="modal-actions">
                    <button class="btn-primary" onclick="confirmCity()">Да</button>
                    <button class="btn-outline" onclick="showCityInput()">Другой</button>
                </div>
            </div>
            <div id="city-input-block" style="display:none;">
                <input type="text" id="city-input" placeholder="Введите город...">
                <button class="btn-primary" onclick="searchAndGoCity()">Перейти</button>
            </div>
            <button class="btn-link" onclick="skipCity()">Пропустить</button>
        </div>
    </div>

    <!-- Auth Modal -->
    <div id="auth-modal" style="display:none;">
        <div class="modal-bg"></div>
        <div class="modal-box">
            <button class="modal-close" onclick="toggleAuth()">×</button>
            <h2>Вход в систему</h2>
            <button class="btn-social" onclick="loginYandexDirect()">
                <span class="social-icon" style="background:#FC3F1D">Я</span> Через Яндекс
            </button>
            <button class="btn-social" onclick="loginMailruDirect()">
                <span class="social-icon" style="background:#0077FF">M</span> Через Mail.ru
            </button>
            <div class="divider"><span>или email</span></div>
            <input type="email" id="auth-email" placeholder="Email" class="auth-input">
            <div class="password-wrapper">
                <input type="password" id="auth-password" placeholder="Пароль" class="auth-input">
                <button type="button" class="btn-toggle-pw" onclick="togglePasswordVisibility()" title="Показать/скрыть пароль">
                    <i data-lucide="eye" id="pw-eye-icon"></i>
                </button>
            </div>
            <div id="auth-error"></div>
            <div style="text-align:right;margin-top:-4px;margin-bottom:4px">
            <button class="btn-link" onclick="forgotPassword()" style="font-size:12px;text-decoration:underline;background:none;border:none;color:var(--muted-fg);cursor:pointer">Забыли пароль?</button>
            </div>
            <!-- Кнопки в одну строку -->
            <div class="modal-actions auth-buttons" style="display:flex;gap:10px;margin-top:8px;">
                <button class="btn-primary" style="flex:1" onclick="emailSignIn()">Войти</button>
                <button class="btn-outline" style="flex:1" onclick="emailSignUp()">Регистрация</button>
            </div>
        </div>
    </div>

    <!-- Profile Modal -->
    <div id="profile-modal" style="display:none;">
        <div class="modal-bg"></div>
        <div class="modal-box">
            <button class="modal-close" onclick="closeProfile()">×</button>
            <h2>Профиль</h2>
            <div id="profile-content"></div>
        </div>
    </div>

    <!-- Confirm Modal -->
    <div id="confirm-modal" style="display:none;">
        <div class="modal-bg"></div>
        <div class="modal-box" style="max-width:340px">
            <h2>Выйти из аккаунта?</h2>
            <!-- Отступ сверху и вертикальное расположение кнопок -->
            <div class="modal-actions" style="margin-top:24px;flex-direction:column;gap:10px">
                <button class="btn-primary" onclick="doSignOut()">Да, выйти</button>
                <button class="btn-outline" onclick="closeConfirm()">Отмена</button>
            </div>
        </div>
    </div>


    <!-- Analyze Settings Modal -->
    <div id="analyze-modal" style="display:none;">
        <div class="modal-bg" onclick="closeAnalyzeModal()"></div>
        <div class="modal-box" id="analyze-modal-content"></div>
    </div>

    <!-- Report Modal -->
    <div id="report-modal" style="display:none;">
        <div class="modal-bg"></div>
        <div class="report-content" id="report-export-area">
            <div class="report-header">
                <button class="modal-close" onclick="closeReport()">×</button>
                <button class="btn-outline" id="pdf-btn" onclick="exportPDF()">
                    <i data-lucide="download"></i> PDF
                </button>
            </div>
            <div id="report-charts">
                <div class="chart-box"><canvas id="pieChart"></canvas></div>
                <div class="chart-box"><canvas id="radarChart"></canvas></div>
            </div>
            <div class="chart-box-full"><canvas id="barChart"></canvas></div>
            <div id="report-text"></div>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://epjtzfhlyyrzmcjqqlyw.supabase.co";
    const SUPABASE_KEY = "sb_publishable_yj38_Ym2C8_Sm-MN-icfSw_URGS-h-J";
</script>
<script src="/js/app.js"></script>
<script>lucide.createIcons();</script>
</body>
</html>
